name: Auto Label

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: auto-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply automatic labels
    runs-on: ubuntu-latest

    steps:
      - name: Ensure repository labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'documentation', color: '0E8A16', description: 'Documentation updates' },
              { name: 'ci', color: '5319E7', description: 'Continuous integration changes' },
              { name: 'github-actions', color: '1D76DB', description: 'GitHub Actions related changes' },
              { name: 'api', color: '0052CC', description: 'API application changes' },
              { name: 'test', color: 'FBCA04', description: 'Automated test changes' },
              { name: 'dependencies', color: '0366D6', description: 'Dependency updates' },
              { name: 'docker', color: '2496ED', description: 'Container and Docker changes' },
              { name: 'azure', color: '0078D4', description: 'Azure deployment and hosting changes' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
              }
            }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true


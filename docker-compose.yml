name: dotnetstore-minimalapi

services:
  webapi:
    container_name: dotnetstore-minimalapi-webapi
    build:
      context: .
      dockerfile: Dockerfile
    image: dotnetstore-minimalapi:local
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

  aspire-dashboard:
    container_name: dotnetstore-minimalapi-aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    profiles:
      - observability
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      ASPNETCORE_URLS: http://+:18888
      DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: http://+:18889
      DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: http://+:18890
      DOTNET_DASHBOARD_MCP_ENDPOINT_URL: http://+:18891
    ports:
      - "18888:18888"
    restart: unless-stopped

